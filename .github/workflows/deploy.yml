name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:        # permite lanzarlo manualmente desde GitHub

permissions:
  contents: read
  pages:    write
  id-token: write

# Solo un deploy a la vez; no cancela el en curso para no dejar el sitio a medias
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. BUILD ──────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Cloud Academy app
        working-directory: apps/cloud_academy
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Build Lighting Black Holes app
        working-directory: apps/lighting-black-holes
        run: |
          npm ci
          npm run build

      # Regenera el HTML de cada curso a partir de su curso.md
      # Así el markdown es la única fuente de verdad
      - name: Regenerate course pages
        run: |
          shopt -s nullglob
          for md in cursos/*/curso.md; do
            [ "$md" = "cursos/template/curso.md" ] && continue
            echo "▶  Building: $md"
            python3 cursos/build_course.py "$md" --no-update-json
          done

      - name: Regenerate demo pages
        run: python3 demos/build_demo.py --all

      # Ensambla solo los archivos que deben ser públicos
      - name: Assemble static site
        run: |
          mkdir -p _site

          # Archivo raíz
          cp index.html _site/
          cp stats.html _site/

          # Logo, favicon y assets compartidos
          rm -rf _site/assets && cp -r assets _site/assets

          # Evita que GitHub intente procesar con Jekyll
          touch _site/.nojekyll

          # Páginas de cursos y recursos
          cp -r cursos _site/cursos

          # Demos interactivos
          cp -r demos _site/demos

          # Apps Next.js (export estático)
          mkdir -p _site/apps
          cp -r apps/cloud_academy/out _site/apps/cloud_academy
          cp -r apps/lighting-black-holes/out _site/apps/lighting-black-holes

          echo "── Contenido del artefacto ──"
          find _site -type f | sort

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ── 2. DEPLOY ─────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
