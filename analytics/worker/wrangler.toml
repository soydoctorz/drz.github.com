name = "drz-academy-visitor-log"
main = "visitor-log-worker.js"
compatibility_date = "2026-04-22"

# Crear namespace:
#   cd analytics/worker && npx wrangler kv namespace create VISITOR_LOGS
# Pegar el id devuelto abajo.
[[kv_namespaces]]
binding = "VISITOR_LOGS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Token de lectura (secreto, no commitear):
#   npx wrangler secret put LOG_READ_TOKEN
#
# IPs a excluir del registro (opcional):
# [vars]
# EXCLUDED_LOG_IPS = "181.32.143.7"
